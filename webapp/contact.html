<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>تواصل معنا — لغة ضاد</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#09090f;--surface:#12141e;--elevated:#1a1d2e;
  --border:#252840;--purple:#7c6af7;--purple-light:#a89cff;
  --purple-dim:#2e2a5a;--text:#e8eaf6;--text-sec:#8b90b8;
  --text-muted:#4a4f72;--green:#4ade80;--red:#f87171;
  --amber:#fbbf24;--font:'Cairo','Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:var(--bg);font-family:var(--font);color:var(--text);
  background-image:linear-gradient(rgba(124,106,247,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,106,247,.04) 1px,transparent 1px);
  background-size:60px 60px;}
.orb{position:fixed;border-radius:50%;pointer-events:none;}
.orb1{width:600px;height:600px;top:-200px;right:-200px;
  background:radial-gradient(circle,rgba(124,106,247,.15) 0%,transparent 65%);}
.orb2{width:400px;height:400px;bottom:-150px;left:-150px;
  background:radial-gradient(circle,rgba(34,211,238,.08) 0%,transparent 65%);}

nav{position:sticky;top:0;z-index:100;
  background:rgba(9,9,15,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(124,106,247,.15);
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 2rem;}
.nav-logo{display:flex;align-items:center;gap:.75rem;text-decoration:none;}
.nav-logo .badge{background:linear-gradient(135deg,#7c6af7,#5b4de8);
  color:#fff;font-size:1.1rem;font-weight:900;padding:.25rem 1rem;
  border-radius:50px;box-shadow:0 0 16px rgba(124,106,247,.4);}
.nav-logo span{font-size:1rem;font-weight:700;color:var(--text);}
.nav-links{display:flex;align-items:center;gap:.5rem;}
.nav-link{color:var(--text-sec);text-decoration:none;font-size:.85rem;
  font-weight:600;padding:.5rem .9rem;border-radius:8px;transition:all .2s;}
.nav-link:hover,.nav-link.active{color:var(--purple-light);background:rgba(124,106,247,.1);}
.nav-btn{background:linear-gradient(135deg,#7c6af7,#5b4de8);color:#fff;
  text-decoration:none;font-size:.85rem;font-weight:700;
  padding:.5rem 1.2rem;border-radius:8px;transition:all .2s;}
.nav-btn:hover{filter:brightness(1.1);}

main{max-width:760px;margin:0 auto;padding:4rem 1.5rem;}

.page-header{text-align:center;margin-bottom:3rem;}
.page-badge{display:inline-flex;align-items:center;gap:.4rem;
  padding:.3rem .9rem;border-radius:999px;
  border:1px solid rgba(124,106,247,.3);background:rgba(124,106,247,.08);
  color:var(--purple-light);font-size:.72rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.2rem;}
.page-header h1{font-size:2.5rem;font-weight:900;margin-bottom:.6rem;}
.page-header p{color:var(--text-sec);font-size:1rem;}

.info-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2.5rem;}
.info-card{background:rgba(18,20,30,.8);border:1px solid var(--border);
  border-radius:14px;padding:1.2rem;text-align:center;transition:all .2s;}
.info-card:hover{border-color:rgba(124,106,247,.3);
  box-shadow:0 4px 20px rgba(124,106,247,.1);}
.info-icon{font-size:1.8rem;margin-bottom:.6rem;}
.info-card h3{font-size:.85rem;font-weight:700;margin-bottom:.3rem;}
.info-card p{font-size:.75rem;color:var(--text-sec);}
.info-card a{color:var(--purple-light);text-decoration:none;}

.contact-card{background:rgba(18,20,30,.9);border:1px solid rgba(124,106,247,.2);
  border-radius:20px;padding:2.2rem;box-shadow:0 0 40px rgba(124,106,247,.08);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{margin-bottom:1.2rem;}
label{display:block;font-size:.82rem;font-weight:600;
  color:var(--text-sec);margin-bottom:.4rem;}
input,select,textarea{width:100%;padding:.75rem 1rem;
  background:var(--bg);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:var(--font);font-size:.9rem;
  outline:none;transition:border-color .2s;direction:rtl;}
input:focus,select,textarea:focus{border-color:var(--purple);
  box-shadow:0 0 0 3px rgba(124,106,247,.12);}
textarea{resize:vertical;min-height:140px;}
.category-chips{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.chip{padding:.4rem .9rem;border-radius:50px;font-size:.78rem;font-weight:600;
  cursor:pointer;border:1px solid var(--border);background:var(--elevated);
  color:var(--text-sec);transition:all .2s;}
.chip.selected{background:var(--purple-dim);border-color:var(--purple);color:var(--purple-light);}
.chip:hover{border-color:rgba(124,106,247,.4);}
.btn-send{width:100%;padding:.9rem;
  background:linear-gradient(135deg,#7c6af7,#5b4de8);color:#fff;
  border:none;border-radius:12px;font-family:var(--font);
  font-size:1rem;font-weight:700;cursor:pointer;
  box-shadow:0 6px 24px rgba(124,106,247,.35);transition:all .25s;}
.btn-send:hover{filter:brightness(1.1);transform:translateY(-2px);}
.btn-send:active{transform:translateY(0);}
.alert{padding:.8rem 1rem;border-radius:10px;font-size:.85rem;
  margin-bottom:1.2rem;display:none;}
.alert.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);}
.alert.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);}

@media(max-width:600px){
  .info-cards{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="badge">ضاد</div>
    <span>لغة ضاد</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">الرئيسية</a>
    <a class="nav-link" href="ide.html">المحرر</a>
    <a class="nav-link" href="learn.html">تعلم</a>
    <a class="nav-link active" href="contact.html">تواصل معنا</a>
    <a class="nav-btn" href="login.html">دخول</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-badge">📬 التواصل والدعم</div>
    <h1>نحن هنا لمساعدتك</h1>
    <p>أي سؤال أو اقتراح أو مشكلة تقنية — أرسل لنا وسنرد في أقرب وقت</p>
  </div>

  <div class="info-cards">
    <div class="info-card">
      <div class="info-icon">📧</div>
      <h3>البريد الإلكتروني</h3>
      <p><a href="mailto:mohabremoo@gmail.com">mohabremoo@gmail.com</a></p>
    </div>
    <div class="info-card">
      <div class="info-icon">💻</div>
      <h3>GitHub</h3>
      <p><a href="https://github.com/Moha-Bremoo/LughatDad" target="_blank">LughatDad Repository</a></p>
    </div>
    <div class="info-card">
      <div class="info-icon">⚡</div>
      <h3>وقت الاستجابة</h3>
      <p>خلال 24–48 ساعة</p>
    </div>
  </div>

  <div class="contact-card">
    <div id="alertBox" class="alert"></div>
    <div class="form-row">
      <div class="form-group">
        <label>الاسم</label>
        <input type="text" id="cName" placeholder="اسمك الكريم"/>
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="cEmail" placeholder="email@example.com"/>
      </div>
    </div>
    <div class="form-group">
      <label>نوع الرسالة</label>
      <div class="category-chips" id="chipGroup">
        <span class="chip selected" data-cat="help">طلب مساعدة</span>
        <span class="chip" data-cat="bug">تقرير خطأ</span>
        <span class="chip" data-cat="suggest">اقتراح</span>
        <span class="chip" data-cat="other">أخرى</span>
      </div>
    </div>
    <div class="form-group">
      <label>الموضوع</label>
      <input type="text" id="cSubject" placeholder="موضوع رسالتك"/>
    </div>
    <div class="form-group">
      <label>الرسالة</label>
      <textarea id="cMessage" placeholder="اكتب رسالتك هنا..."></textarea>
    </div>
    <button class="btn-send" onclick="sendMessage()">📨 إرسال الرسالة</button>
  </div>
</main>

<script>
var selectedCat = 'help';
document.querySelectorAll('.chip[data-cat]').forEach(function(c){
  c.addEventListener('click', function(){
    document.querySelectorAll('.chip[data-cat]').forEach(function(x){x.classList.remove('selected');});
    c.classList.add('selected');
    selectedCat = c.dataset.cat;
  });
});

function showAlert(msg, type){
  var a = document.getElementById('alertBox');
  a.textContent = msg; a.className = 'alert '+type; a.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(function(){a.style.display='none';}, 5000);
}

function sendMessage(){
  var name    = document.getElementById('cName').value.trim();
  var email   = document.getElementById('cEmail').value.trim();
  var subject = document.getElementById('cSubject').value.trim();
  var message = document.getElementById('cMessage').value.trim();

  if(!name||!email||!subject||!message){
    showAlert('يرجى ملء جميع الحقول', 'err'); return;
  }
  if(!email.includes('@')){
    showAlert('يرجى إدخال بريد إلكتروني صحيح', 'err'); return;
  }

  var catLabels = {help:'طلب مساعدة',bug:'تقرير خطأ',suggest:'اقتراح',other:'أخرى'};
  var body = encodeURIComponent(
    'الاسم: '+name+'\n'+
    'البريد: '+email+'\n'+
    'النوع: '+catLabels[selectedCat]+'\n'+
    '---\n'+message
  );
  var sub = encodeURIComponent('[لغة ضاد] '+subject);
  window.location.href = 'mailto:mohabremoo@gmail.com?subject='+sub+'&body='+body;
  showAlert('شكراً '+name+'! سيتم فتح تطبيق البريد الإلكتروني تلقائياً ✉️', 'ok');
}
</script>
</body>
</html>
